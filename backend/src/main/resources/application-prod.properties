spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shopkeeper_sales}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool - retry if DB isn't ready yet
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Redis Configuration (Production via Railway)
spring.redis.url=${REDIS_URL}
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
